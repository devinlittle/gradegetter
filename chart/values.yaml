postgresql:
  enabled: true
  auth:
    username: devin
    password: password
    database: gradegetter

backend:
  image:
    repository: 10.10.10.245:5000/devin/ggbackend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 3000
  env:
    RUST_LOG: info

gradegetter:
  image:
    repository: 10.10.10.245:5000/devin/gg
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 3001
  env:
    PUPPETEER_EXECUTABLE_PATH: /usr/lib/chromium/chromium
    RUST_LOG: info

secretName: gradegetter-secrets
imagePullSecret: registry-creds

ingress:
  enabled: true
  host: gradegetter.exmaple.com
  annotations:
    kubernetes.io/ingress.class: nginx
